<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/metas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../css/novatransacao.css">
    <link rel="shortcut icon" href="../midia/icone.ico" type="image/x-icon">
</head>
<body>
    <div class="menu-titulo-nt">
    <div id="overlay" class="overlay"></div>
    
    <div id="menu-container"></div>
    <h1>Metas</h1>
</div>

    <main class="metas">

    <button class="btn-nova-meta">
        <i class="fas fa-plus"></i>
        Nova Meta
    </button>

    <div class="card-meta">

        <div class="topo-meta">

            <h3>Viagem para o Japão</h3>

            <span>65%</span>

        </div>

        <div class="barra">

            <div class="progresso" style="width:65%;"></div>

        </div>

        <div class="valores">

            <span>R$ 6.500,00</span>

            <span>Meta: R$ 10.000,00</span>

        </div>

        <p class="data-meta">
            📅 Até 20/12/2027
        </p>

        <button class="btn-editar-meta">
            <i class="fas fa-pen"></i>
            Editar
        </button>

    </div>

    <div class="card-meta">

        <div class="topo-meta">

            <h3>Notebook Novo</h3>

            <span>40%</span>

        </div>

        <div class="barra">

            <div class="progresso" style="width:40%;"></div>

        </div>

        <div class="valores">

            <span>R$ 2.000,00</span>

            <span>Meta: R$ 5.000,00</span>

        </div>

        <p class="data-meta">
            📅 Até 15/03/2027
        </p>

        <button class="btn-editar-meta">
            <i class="fas fa-pen"></i>
            Editar
        </button>

    </div>

    <button class="btn-voltar" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
        Voltar
    </button>
</main>
<script src="../javascript/menu.js"></script>
<script src="../javascript/nova-transacao.js"></script>
</body>
</html>
