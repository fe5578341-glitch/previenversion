<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>configurações</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/configuracoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../css/novatransacao.css">
    <link rel="shortcut icon" href="../midia/icone.ico" type="image/x-icon">
</head>
<body>
    <div class="menu-titulo-nt">
    <div id="overlay" class="overlay"></div>
    
    <div id="menu-container"></div>
    <h1>Nova categoria </h1>
</div>

    <main class="configuracoes">

    <div class="card-config">

        <h2>Preferências</h2>

        <div class="item-config">
            <span>🌙 Tema escuro</span>
            <input type="checkbox" checked>
        </div>

        <div class="item-config">
            <span>💰 Contar investimentos no saldo</span>
            <input type="checkbox">
        </div>

        <div class="item-config">
            <span>🔔 Notificações</span>
            <input type="checkbox" checked>
        </div>

    </div>

    <div class="card-config">

        <h2>Moeda</h2>

        <select>
            <option>Real Brasileiro (R$)</option>
            <option>Dólar (US$)</option>
            <option>Euro (€)</option>
        </select>

    </div>

    <div class="card-config">

        <h2>Dados</h2>

        <button class="btn-config">
            Exportar Transações
        </button>

        <button class="btn-config">
            Fazer Backup
        </button>

        <button class="btn-config">
            Restaurar Backup
        </button>

    </div>

    <div class="card-config">

        <h2>Sobre</h2>

        <p>App</p>
        <span>Versão 1.0</span>

    </div>

    <button class="btn-voltar" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
        Voltar
    </button>

</main>

<script src="../javascript/menu.js"></script>
<script src="../javascript/nova-transacao.js"></script>
</body>
</html>
